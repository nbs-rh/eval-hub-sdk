---
# ConfigMap containing the job specification
# The EvalHub service creates this when launching a job
apiVersion: v1
kind: ConfigMap
metadata:
  name: eval-job-001-spec
  namespace: evalhub-test
data:
  job.json: |
    {
      "id": "eval-job-001",
      "provider_id": "evalhub-provider",
      "benchmark_id": "mmlu",
      "benchmark_index": 0,
      "model": {
        "url": "http://model-server.models.svc.cluster.local:8000/v1",
        "name": "llama-2-7b-chat"
      },
      "num_examples": 1000,
      "benchmark_config": {
        "subject": "all",
        "num_few_shot": 5,
        "random_seed": 42
      },
      "callback_url": "unused",
      "experiment_name": "llama-2-evaluation",
      "tags": [
        {"key": "model_family", "value": "llama-2"},
        {"key": "model_size", "value": "7b"},
        {"key": "env", "value": "production"}
      ]
    }

# might want to append:
# "exports": {
#   "oci": {
#     "coordinates": {
#       "oci_host": "quay.io",
#       "oci_repository": "mmortari/demo20260212"
#     }
#   }
# }
---
# Pod running the adapter with sidecar
apiVersion: v1
kind: Pod
metadata:
  name: eval-job-001
  namespace: evalhub-test
  labels:
    app: evalhub-adapter
    job-id: eval-job-001
    benchmark: mmlu
spec:
  restartPolicy: Never
  serviceAccountName: evalhub-job-runner

  # Share process namespace so containers can see each other
  shareProcessNamespace: true

  containers:
    # Main adapter container
    - name: adapter
      image: quay.io/mmortari/simple-adapter:latest
      # imagePullPolicy: Always

      # ConfigMap mounted at /meta/job.json
      volumeMounts:
        - name: job-spec
          mountPath: /meta
          readOnly: true
        # - name: oci-credentials
        #   mountPath: /etc/evalhub/.docker/config.json
        #   subPath: .dockerconfigjson
        #   readOnly: true

      # Environment variables for registry access
      env:
        # - name: OCI_AUTH_CONFIG_PATH
        #   value: "/etc/evalhub/.docker/config.json"
        - name: EVALHUB_MODE  # necessary for the defaults
          value: "k8s"

      # Resource limits
      resources:
        requests:
          memory: "2Gi"
          cpu: "1"
        limits:
          memory: "4Gi"
          cpu: "2"

    # Sidecar (not yet implemented) for communication with EvalHub service
    # - name: sidecar
    #   image: ghcr.io/evalhub/job-sidecar:latest
    #   imagePullPolicy: IfNotPresent

    #   # Sidecar listens on localhost:8080
    #   ports:
    #     - name: http
    #       containerPort: 8080
    #       protocol: TCP

    #   # Environment variables for EvalHub service connection
    #   env:
    #     - name: EVALHUB_SERVICE_URL
    #       value: "http://evalhub-service.evalhub.svc.cluster.local:8080"
    #     - name: JOB_ID
    #       value: "eval-job-001"

    #   # Health check
    #   livenessProbe:
    #     httpGet:
    #       path: /health
    #       port: 8080
    #     initialDelaySeconds: 5
    #     periodSeconds: 10

    #   resources:
    #     requests:
    #       memory: "128Mi"
    #       cpu: "100m"
    #     limits:
    #       memory: "256Mi"
    #       cpu: "200m"

  volumes:
    - name: job-spec
      configMap:
        name: eval-job-001-spec
    # - name: oci-credentials
    #   secret:
    #     secretName: my-oci-credentials

---
# Secret containing registry credentials
# This should be created once and reused
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: evalhub-test
type: Opaque
stringData:
  username: "your-github-username"
  password: "ghp_your_github_token"

---
# ServiceAccount for job pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: evalhub-job-runner
  namespace: evalhub-test

---
# Role for job pods (minimal permissions)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: evalhub-job-runner
  namespace: evalhub-test
rules:
  # Pods can read their own metadata
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: evalhub-job-runner
  namespace: evalhub-test
subjects:
  - kind: ServiceAccount
    name: evalhub-job-runner
    namespace: evalhub-test
roleRef:
  kind: Role
  name: evalhub-job-runner
  apiGroup: rbac.authorization.k8s.io
